# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "thrust_alphas"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"

# --- Core stack (always needed) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=0.3.40"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
# Statistical models and fitting
pyhf = ">=0.7"
iminuit = ">=2.25"
# Jet clustering
fastjet = ">=3.4"
# Fitting
scikit-learn = ">=1.3"

[tasks]
py = "python"
# --- Analysis tasks: add as you write scripts ---
# Each script gets an independently runnable task.
# The "all" task chains the full sequence — this is the reproducibility contract.
# Example:
#   select = "python phase3_selection/scripts/apply_selection.py"
#   unfold = "python phase4_inference/scripts/unfold.py"
#   systematics = "python phase4_inference/scripts/run_systematics.py"
#   all = "python phase3_selection/scripts/apply_selection.py && python phase4_inference/scripts/unfold.py && python phase4_inference/scripts/run_systematics.py"
