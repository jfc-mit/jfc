# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "thrust_alphas"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"

# --- Core stack (always needed) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=0.3.40"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
# Statistical models and fitting
pyhf = ">=0.7"
iminuit = ">=2.25"
# Jet clustering
fastjet = ">=3.4"
# Fitting
scikit-learn = ">=1.3"

[tasks]
py = "python"
# --- Phase 2: Exploration ---
explore-structure = "python phase2_exploration/scripts/01_discover_structure.py"
explore-inspect = "python phase2_exploration/scripts/02_inspect_sample.py"
explore-distributions = "python phase2_exploration/scripts/03_distributions.py"
explore-mc-truth = "python phase2_exploration/scripts/04_mc_truth_response.py"
explore-all = "python phase2_exploration/scripts/01_discover_structure.py && python phase2_exploration/scripts/02_inspect_sample.py && python phase2_exploration/scripts/03_distributions.py && python phase2_exploration/scripts/04_mc_truth_response.py"
# --- Phase 3: Selection and Modeling ---
select = "python phase3_selection/scripts/apply_selection.py"
response = "python phase3_selection/scripts/build_response.py"
closure = "python phase3_selection/scripts/run_closure.py"
datamc = "python phase3_selection/scripts/data_mc_validation.py"
validate-pwflags = "python phase3_selection/scripts/validate_pwflag_categories.py"
prototype = "python phase3_selection/scripts/prototype_chain.py"
phase3-all = "python phase3_selection/scripts/apply_selection.py && python phase3_selection/scripts/build_response.py && python phase3_selection/scripts/run_closure.py && python phase3_selection/scripts/data_mc_validation.py && python phase3_selection/scripts/validate_pwflag_categories.py && python phase3_selection/scripts/prototype_chain.py"
# --- Phase 4: Inference ---
validate-iters = "python phase4_inference/scripts/validate_iterations.py"
systematics = "python phase4_inference/scripts/run_systematics.py"
covariance = "python phase4_inference/scripts/build_covariance.py"
final-result = "python phase4_inference/scripts/final_result.py"
extract-alphas = "python phase4_inference/scripts/extract_alphas.py"
compare-refs = "python phase4_inference/scripts/compare_references.py"
stress-test = "python phase4_inference/scripts/stress_test.py"
fix-systematics = "python phase4_inference/scripts/fix_systematics.py"
phase4-all = "python phase4_inference/scripts/validate_iterations.py && python phase4_inference/scripts/run_systematics.py && python phase4_inference/scripts/build_covariance.py && python phase4_inference/scripts/final_result.py && python phase4_inference/scripts/extract_alphas.py && python phase4_inference/scripts/compare_references.py && python phase4_inference/scripts/fix_systematics.py"
# --- Full analysis chain (update as phases are added) ---
all = "python phase3_selection/scripts/apply_selection.py && python phase3_selection/scripts/build_response.py && python phase3_selection/scripts/run_closure.py && python phase3_selection/scripts/data_mc_validation.py && python phase3_selection/scripts/validate_pwflag_categories.py && python phase3_selection/scripts/prototype_chain.py && python phase4_inference/scripts/validate_iterations.py && python phase4_inference/scripts/run_systematics.py && python phase4_inference/scripts/build_covariance.py && python phase4_inference/scripts/final_result.py && python phase4_inference/scripts/extract_alphas.py && python phase4_inference/scripts/compare_references.py && python phase4_inference/scripts/fix_systematics.py"
