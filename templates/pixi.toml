# To add a dependency: add it below, then `pixi install` from this directory.

[project]
name = "{name}"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"

# --- Base scikit-hep stack (do not remove) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
coffea = ">=2024.0"
pyhf = ">=0.7"
cabinetry = ">=0.6"
mplhep = ">=0.3.40"
matplotlib = ">=3.8"
numpy = ">=1.24"
scipy = ">=1.11"
scikit-learn = ">=1.3"
xgboost = ">=2.0"
vector = ">=1.1"
particle = ">=0.23"
iminuit = ">=2.25"
rich = ">=13.0"
# --- Add analysis-specific dependencies below this line ---

[tasks]
py = "python"
