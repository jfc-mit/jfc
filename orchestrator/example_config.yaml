# GAD analysis config — ZH → ννbb at ALEPH/LEP2
#
# Usage:
#   pixi run gad orchestrator/example_config.yaml
#   pixi run gad --dry-run orchestrator/example_config.yaml

analysis_name: zh_nunubb_aleph

physics_prompt_path: prompt.md       # Your analysis question / physics goal
methodology_path: methodology.md     # Path to the methodology spec

data_paths:
  data: /data/aleph/reprocessed/data_2000_209.root
  signal_mc: /data/aleph/mc/zh_nunubb.root
  background_mc:
    ww: /data/aleph/mc/ww_4f.root
    zz: /data/aleph/mc/zz_4f.root
    qqbar: /data/aleph/mc/qqbar.root

channels:
  - nunu

calibrations:
  - btag

# Model tier: "auto" uses per-role defaults, "uniform_high" = all opus,
# "uniform_mid" = all sonnet
model_tier: auto

# Per-role model overrides (only used when model_tier: auto)
tiers:
  executor_strategy: opus
  executor_default: sonnet
  reviewer_3bot: opus
  reviewer_1bot: sonnet
  arbiter: opus
  investigator: opus
  calibration: sonnet
  mechanical: haiku

cost_controls:
  max_review_iterations: 10
  review_warn_threshold: 3
  review_strong_warn_threshold: 5
  total_budget_warn: 50.00      # USD — pause pipeline if exceeded
  on_budget_exceeded: pause     # "pause" or "warn_and_continue"

# RAG server for experiment corpus (optional)
# rag:
#   command: python
#   args: ["-m", "scitreerag.serve", "--corpus", "/data/aleph/corpus"]

git_enabled: true
